<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipping Crad UI</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <section>
      <div class="container">
        <div class="card front">
          <header>
            <div class="title">
              <h1>Rodrigo González</h1>
            </div>
            <div class="socials">
              <a
                href="https://github.com/rodrigo-gonzalez-tech"
                target="_blank"
                rel="noopener noreferrer"
                ><i class="fa-brands fa-github"></i
              ></a>
              <a
                href="https://www.linkedin.com/in/rodrigo-gonzalez-tech/"
                target="_blank"
                rel="noopener noreferrer"
                ><i class="fa-brands fa-linkedin"></i
              ></a>
            </div>
          </header>
          <div class="details">
            <div class="about-me">
              <p class="label">About</p>
              <p class="content">
                Computer Science student with a passion for building software
              </p>
            </div>
            <div class="tech-stack">
              <p class="label">Tech I'm the most familiar with:</p>
              <div class="tags">
                <span class="tag">JavaScript</span>
                <span class="tag">Node.js</span>
                <span class="tag">React</span>
                <span class="tag">Python</span>
                <span class="tag">SQL</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
